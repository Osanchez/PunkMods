name: Build & Release Mods

# Every push/merge to main builds all mods and publishes one zip per mod as a GitHub Release.
# The proprietary reference DLLs are NOT in git; they're pulled from the 'refs' release asset in the
# private Osanchez/PunkMods-refs repo, using a fine-grained PAT stored as the REFS_TOKEN secret.
# (This repo can therefore be public without exposing those DLLs.)
on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you also trigger a build manually from the Actions tab

permissions:
  contents: write           # required to download the 'refs' asset and to create Releases

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download reference DLLs (private PunkMods-refs release asset)
        env:
          GH_TOKEN: ${{ secrets.REFS_TOKEN }}
        shell: pwsh
        run: |
          if (-not $env:GH_TOKEN) { throw "REFS_TOKEN secret is not set. Create a fine-grained PAT with read access to Osanchez/PunkMods-refs and add it as the REFS_TOKEN secret." }
          New-Item -ItemType Directory -Force -Path gamedir | Out-Null
          gh release download refs --repo Osanchez/PunkMods-refs --pattern punk-refs.zip --dir . --clobber
          Expand-Archive -Path punk-refs.zip -DestinationPath gamedir -Force

      - name: Build & package (one zip per mod)
        shell: pwsh
        run: ./build-package.ps1 -GameDir "$PWD/gamedir" -Ci -PerMod

      - name: Compute version tag
        id: ver
        shell: pwsh
        run: |
          $tag = "v{0}.{1}" -f (Get-Date -Format 'yyyy.MM.dd'), '${{ github.run_number }}'
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: PUNK Mods ${{ steps.ver.outputs.tag }}
          files: dist/*.zip
          generate_release_notes: true
